        // ===========================================
        // VIDEO SYSTEMS OVERVIEW
        // ===========================================
        // Terrain supports THREE video playback systems:
        //
        // 1. VIDEO NODES (node.video.src) - "Baked-in audio"
        //    - Use when: Video has its own audio track, user controls playback
        //    - Element: viewportVideo (persistent, hidden when not in use)
        //    - State: videoState tracks ready/playing/paused/ended
        //    - Features: start poster, end poster, GO key to start
        //    - Cleanup: teardownVideo()
        //
        // 2. TIMED VIDEO (visuals[].type === 'video') - "Split A/V"
        //    - Use when: Video syncs to separate primaryAudio track
        //    - Element: timedVideo (created dynamically, removed on cleanup)
        //    - State: timedVideo reference, timedVideoScheduled timers
        //    - Features: auto-sync to audio, scheduled visual switches
        //    - Cleanup: cleanupTimedVideo()
        //
        // 3. YOUTUBE NODES (node.video.youtubeId) - "External embed"
        //    - Use when: Video hosted on YouTube, saves storage/bandwidth
        //    - Element: youtubeContainer with iframe
        //    - State: youtubeState tracks ready/playing
        //    - Features: poster image, GO key reveals YouTube player
        //    - Cleanup: teardownYouTube()
        //
        // These systems are mutually exclusive per node but coexist in the codebase.

        // ===========================================
        // VIDEO NODE STATE (baked-in audio)
        // ===========================================
        // States: null (no video), 'ready', 'playing', 'paused', 'ended'
        let videoState = null;
        
        // Audio manual start state: null (normal autoplay), 'ready' (awaiting GO)
        let audioManualState = null;

        // ===========================================
        // YOUTUBE NODE STATE
        // ===========================================
        // States: null (no youtube), 'ready', 'playing'
        let youtubeState = null;

        // ===========================================
        // TIMED VIDEO STATE (synced to primary audio)
        // ===========================================
        let timedVideo = null;  // Reference to active timed video element
        let timedVideoScheduled = [];  // Scheduled timed video switches (legacy; visuals now audio-synced)
        let timedVideoPersist = false;  // If true, video continues after audio ends
        let lastTimedVisualKey = null;  // Avoid re-applying the same timed visual every tick
        let nodeEnterWallTime = null;   // Fallback clock for nodes without primary audio

        function getTimedVisualTimestampMs() {
            if (primaryAudio.src && Number.isFinite(primaryAudio.currentTime)) {
                return primaryAudio.currentTime * 1000;
            }
            if (nodeEnterWallTime) {
                return Date.now() - nodeEnterWallTime;
            }
            return 0;
        }

        function timedVisualKey(visual) {
            if (!visual) return 'none';
            if (visual.type === 'image_bundle') {
                return `${visual.start || 0}-${visual.type}-${visual.files?.[0] || ''}`;
            }
            return `${visual.start || 0}-${visual.type}-${visual.src || ''}`;
        }

        function getActiveTimedVisual(visuals, timestamp) {
            if (!visuals?.length) return null;
            return visuals
                .filter(v => {
                    const start = v.start || 0;
                    if (timestamp < start) return false;
                    if ((v.type === 'image' || v.type === 'image_bundle') && v.duration && v.duration > 0) {
                        return timestamp < start + v.duration;
                    }
                    return true;
                })
                .sort((a, b) => (b.start || 0) - (a.start || 0))[0] || null;
        }

        function applyTimedVisual(visual, node) {
            if (!visual || !node) return;
            if (visual.type === 'image') {
                cleanupTimedVideo();
                crossfadeToImage(visual.src, node.id);
            } else if (visual.type === 'image_bundle') {
                cleanupTimedVideo();
                const bundleKey = `${node.id}_timed_${visual.start || 0}`;
                const selectedImage = selectImageBundleFile(visual.files, visual.mode || 'random_tracked', bundleKey);
                if (selectedImage) {
                    crossfadeToImage(selectedImage, node.id);
                }
            } else if (visual.type === 'video') {
                if (timedVideo && timedVideo.parentNode) {
                    const videoStartTime = visual.start || 0;
                    const videoOffset = (getTimedVisualTimestampMs() - videoStartTime) / 1000;
                    timedVideo.currentTime = Math.max(0, videoOffset);
                    if (timedVideo.paused && !primaryAudio.paused) {
                        timedVideo.play().catch(() => {});
                    }
                } else {
                    cleanupTimedVideo();
                    const video = setupTimedVideo(visual.src, visual.start || 0, visual.duration || 0, visual.poster, visual.loop, visual.persist);
                    const videoStartTime = visual.start || 0;
                    const videoOffset = (getTimedVisualTimestampMs() - videoStartTime) / 1000;
                    video.currentTime = Math.max(0, videoOffset);
                    video.play().catch(e => console.log('Timed video play failed:', e));
                }
            }
        }

        function checkTimedVisuals() {
            if (!currentNode?.visuals || currentNode.visuals.length <= 1) return;
            if (videoState) return;

            const timestamp = getTimedVisualTimestampMs();
            const activeVisual = getActiveTimedVisual(currentNode.visuals, timestamp);
            const key = timedVisualKey(activeVisual);

            if (key === lastTimedVisualKey) return;
            lastTimedVisualKey = key;

            if (activeVisual) {
                applyTimedVisual(activeVisual, currentNode);
            } else {
                revertToPrimaryVisual(currentNode);
            }
        }

        function setupTimedVideo(videoSrc, startTime, duration, posterSrc, loop = false, persist = false) {
            // Create video element in viewport
            const video = document.createElement('video');
            video.src = resolveMediaUrl(videoSrc);
            video.autoplay = false;  // We'll control playback
            video.controls = false;
            video.playsInline = true;
            video.muted = true;  // Muted because audio comes from primaryAudio
            video.loop = loop;  // Enable looping if specified
            video.style.cssText = 'position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 3;';
            
            // Set poster if provided (posters are images, served from Pages)
            if (posterSrc) {
                video.poster = posterSrc;
            }

            // Safari-specific: handle unexpected video pause (silent recovery)
            video.addEventListener('pause', () => {
                // If video paused unexpectedly while audio is playing, just resume (no seek)
                if (timedVideo === video && !primaryAudio.paused && !video.ended) {
                    video.play().catch(() => {});
                }
            });

            // Error recovery - fall back to poster or node image if video fails
            video.addEventListener('error', (e) => {
                // Ignore errors from cleaned-up videos (stale error events)
                if (video._cleaned) {
                    return;
                }
                
                console.error('Timed video error:', video.error?.message || e, 'src:', video.src);
                
                // Try to show fallback image instead of broken video
                if (timedVideo === video && currentNode) {
                    let fallbackSrc = posterSrc;  // Try poster first
                    
                    // If no poster, try the node's first image
                    if (!fallbackSrc && currentNode.visuals?.length > 0) {
                        const firstVisual = currentNode.visuals.find(v => v.type === 'image');
                        if (firstVisual) {
                            fallbackSrc = firstVisual.src;
                        }
                    }
                    
                    if (fallbackSrc) {
                        console.log('Timed video failed, falling back to image:', fallbackSrc);
                        cleanupTimedVideo();
                        crossfadeToImage(fallbackSrc, currentNode.id);
                    }
                }
            });

            // Add to viewport
            const viewport = document.getElementById('viewport');
            viewport.appendChild(video);
            timedVideo = video;
            timedVideoPersist = persist;  // Track if this video should persist after audio ends

            // Preload the video
            video.load();

            return video;
        }

        function cleanupTimedVideo(force = false) {
            // Only clean up the video element - don't clear scheduled timers here
            // Timers are cleared by clearTimedVisualSchedule() when leaving a node
            
            // If persist is true and not forcing cleanup, keep the video playing
            if (timedVideoPersist && !force && timedVideo && !timedVideo.paused) {
                console.log('Timed video persisting after audio end');
                return;
            }
            
            if (timedVideo) {
                timedVideo.pause();
                
                // Mark as cleaned up to prevent error handler from acting on stale video
                timedVideo._cleaned = true;
                
                // Store reference for delayed removal
                const videoToRemove = timedVideo;
                
                // Clear state immediately so new visuals can be set up
                timedVideo = null;
                timedVideoPersist = false;
                
                // Delay actual removal to allow crossfade to happen over the video
                // The next node's image will fade in on top, then we remove
                setTimeout(() => {
                    if (videoToRemove.parentNode) {
                        videoToRemove.parentNode.removeChild(videoToRemove);
                    }
                    videoToRemove.src = '';
                }, 500);  // Match crossfade duration + buffer
            }
        }
        
        function clearTimedVisualSchedule() {
            // Clear all scheduled timed visual timers (called when leaving a node)
            timedVideoScheduled.forEach(id => Timers.clearTimeout(id));
            timedVideoScheduled = [];
        }

        function syncTimedVideoToAudio() {
            // Sync timed video playback position to primaryAudio
            // Called on explicit sync points (resume, seek) - not continuously
            if (!timedVideo || !timedVideo.parentNode || !primaryAudio.src) return;

        /** Extract 11-char video ID from bare ID, URL, or pasted watch link */
        function normalizeYouTubeId(raw) {
            if (!raw || typeof raw !== 'string') return '';
            const trimmed = raw.trim();
            const urlMatch = trimmed.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/|live\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
            if (urlMatch) return urlMatch[1];
            const bare = trimmed.split(/[?&#]/)[0];
            if (/^[a-zA-Z0-9_-]{11}$/.test(bare)) return bare;
            return '';
        }

                    if (item && typeof item === 'object') return { src: item.src || '', caption: item.caption || '' };
                    return { src: '', caption: '' };
                })
                .filter(x => typeof x.src === 'string' && x.src.trim().length > 0)

        function updateCarouselUI() {

            const total = carouselImages.length || 1;

            updateCarouselCounter(total, idx);

            updateCarouselUI();

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return '0:00';

            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;

        function updateProgressBar() {
            // Handle video ready state (show duration at 0:00)
            if (videoState === 'ready' && viewportVideo.duration > 0) {
                progressBar.style.width = '0%';
                progressText.textContent = `0:00 / ${formatTime(viewportVideo.duration)}`;
                return;
            }
            
            // Handle audio manual start ready state (show duration at 0:00)
            if (audioManualState === 'ready') {
                // Don't overwrite user input or address mode display
                if (isAddressMode || inputValue.length > 0) return;
                if (primaryAudio.duration > 0) {
                    progressBar.style.width = '0%';
                    progressText.textContent = `Press ✓ to play audio · ${formatTime(primaryAudio.duration)}`;
                }
                return;
            }
            
            // Get active media element (video or audio)
            const media = getActiveMediaElement();
            const hasPrimary = !!(media && media.src && media.src !== '');
            const hasAux1 = !!(aux1Audio && aux1Audio.src && aux1Audio.src !== '');
            const hasChoices = !!(currentNode?.choices && currentNode.choices.length > 0);
            
            // If no primary audio but has aux1 or choices, show guidance message
            if (!hasPrimary && (hasAux1 || hasChoices)) {
                progressBar.style.width = '0%';
                if (!isAddressMode && inputValue.length === 0) {
                    progressText.textContent = 'Make a choice when ready';
                }
                return;
            }
            
            // Skip time updates when typing/address; still refresh idle copy when exiting address mode
            if (isAddressMode || inputValue.length > 0) {
                return;
            }
            if (!media.src || (media.paused && videoState !== 'ended')) {
                refreshIdleProgressDisplay();
                return;
            }
            
            const current = media.currentTime;
            const duration = media.duration;
            if (duration > 0) {
                const percent = (current / duration) * 100;
                progressBar.style.width = `${percent}%`;
                
                // Show playlist track info if active (audio only)
                let displayText = '';
                if (!videoState && currentPlaylist) {
                    const trackNum = currentPlaylist.currentTrack + 1;
                    const totalTracks = currentPlaylist.files.length;
                    displayText = `Track ${trackNum}/${totalTracks} - ${formatTime(current)} / ${formatTime(duration)}`;
                } else {
                    displayText = `${formatTime(current)} / ${formatTime(duration)}`;
                }
                
                progressText.textContent = displayText;
                
                // Periodically save playlist position for resume (every ~10 seconds)
                if (currentPlaylist && current > 0) {
                    const now = Date.now();
                    if (!currentPlaylist._lastPositionSave || now - currentPlaylist._lastPositionSave > 10000) {
                        currentPlaylist._lastPositionSave = now;
                        savePlaylistState(currentPlaylist.nodeId, {
                            currentTrack: currentPlaylist.currentTrack,
                            currentTime: current
                        });
                    }
                }
            }
            
            // Check for interruptible choices (audio-driven, including timed video nodes)
            // videoState is only set for standalone video nodes (node.video), not timed videos
            if (!videoState) {
                checkInterruptibles();
                checkTimedVisuals();
                
                // Light periodic check - only correct severe drift (> 2 seconds)
                // Check every 5 seconds to minimize performance impact
                if (timedVideo && timedVideo.parentNode && !primaryAudio.paused && !timedVideo.paused) {
                    const now = Date.now();
                    const lastSyncCheck = timedVideo._lastSyncCheck || 0;
                    
                    if (now - lastSyncCheck > 5000) {
                        timedVideo._lastSyncCheck = now;
                        const drift = Math.abs(timedVideo.currentTime - primaryAudio.currentTime);
                        if (drift > 2.0 && !timedVideo.ended) {
                            timedVideo.currentTime = primaryAudio.currentTime;
                        }
                    }
                }
            }
        }

        function fadeInAux(audioElement, targetVolume, duration) {
            audioElement.volume = 0;
            audioElement.play().then(() => {
                // Force the target volume after play succeeds (helps with mobile)
                const startTime = Date.now();
                const fadeInterval = Timers.setInterval(() => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    audioElement.volume = progress * targetVolume;
                    
                    if (progress >= 1) {
                        Timers.clearInterval(fadeInterval);
                    }
                }, 50);
            }).catch(e => console.log('Aux audio failed:', e));
        }

        function setupAux1Crossfade(audioSrc, crossfadeDuration) {
            // Monitor aux1 and trigger crossfade near the end
            aux1CrossfadeInterval = Timers.setInterval(() => {
                if (!aux1Audio.paused && aux1Audio.duration > 0) {
                    const timeRemaining = aux1Audio.duration - aux1Audio.currentTime;
                    
                    // Start crossfade when remaining time equals crossfade duration
                    if (timeRemaining <= crossfadeDuration / 1000 && aux1CrossfadeAudio.paused) {
                        // Set up the crossfade audio
                        aux1CrossfadeAudio.src = audioSrc;
                        aux1CrossfadeAudio.volume = 0;
                        aux1CrossfadeAudio.currentTime = 0;
                        aux1CrossfadeAudio.play().catch(e => console.log('Crossfade audio failed:', e));
                        
                        // Crossfade: fade out aux1, fade in aux1Crossfade
                        const startTime = Date.now();
                        const fadeInterval = Timers.setInterval(() => {
                            const elapsed = Date.now() - startTime;
                            const progress = Math.min(elapsed / crossfadeDuration, 1);
                            
                            const targetVolume = 1.0;

                            // Equal power crossfade using cosine/sine curves
                            aux1Audio.volume = targetVolume * Math.cos(progress * Math.PI / 2);
                            aux1CrossfadeAudio.volume = targetVolume * Math.sin(progress * Math.PI / 2);
                            
                            if (progress >= 1) {
                                Timers.clearInterval(fadeInterval);
                                // Swap: crossfade becomes main, prepare for next loop
                                aux1Audio.pause();
                                aux1Audio.currentTime = 0;
                                aux1Audio.volume = 1.0;
                                
                                // Swap the audio elements
                                const temp = aux1Audio;
                                aux1Audio = aux1CrossfadeAudio;
                                aux1CrossfadeAudio = temp;
                                aux1CrossfadeAudio.src = ''; // Clear for next use
                                aux1CrossfadeAudio.pause(); // Make sure it's paused
                            }
                        }, 50);
                    }
                }
            }, 100); // Check every 100ms
        }

        // Convert dB adjustment to volume multiplier

        // Loads site-config.json to override CSS variables, page title,

        // should NOT be overwritten when updating index.html.
        function resolveBootImageUrl(path) {
            if (!path) return DEFAULT_BOOT_IMAGE;
            if (path.startsWith('http://') || path.startsWith('https://') || path.startsWith('data:')) {
                return path;
            }
            const baseEl = document.querySelector('base[href]');
            const base = (baseEl && baseEl.href) ? baseEl.href : `${window.location.origin}/`;
            try {
                return new URL(path.replace(/^\//, ''), base).href;
            } catch {
                return path;
            }
        }

        function applyBootImage(startImage) {
            bootImagePath = (startImage || DEFAULT_BOOT_IMAGE).trim() || DEFAULT_BOOT_IMAGE;
            bootImageResolved = resolveBootImageUrl(bootImagePath);
            const imageA = document.getElementById('viewportImageA');
            if (imageA && !appStarted) {
                imageA.src = bootImageResolved;
                imageA.setAttribute('data-boot-image', '1');
            }
        }

        function clearBootImageIfShowing() {
            for (const id of ['viewportImageA', 'viewportImageB']) {
                const img = document.getElementById(id);
                if (img && img.getAttribute('data-boot-image') === '1') {
                    img.src = '';
                    img.removeAttribute('data-boot-image');
                }
            }

        async function loadSiteConfig() {
            try {
                const response = await fetch('/site-config.json');
                if (!response.ok) {
                    console.log('No site-config.json found, using defaults');
                    applyBootImage(null);
                    return;
                }
                const cfg = await response.json();
                siteConfig = cfg;
                applyBootImage(cfg.startImage);

                // Page title
                if (cfg.title) document.title = cfg.title;

                // Meta tags
                if (cfg.themeColor) {
                    const meta = document.querySelector('meta[name="theme-color"]');
                    if (meta) meta.setAttribute('content', cfg.themeColor);
                }
                if (cfg.pwaTitle) {
                    const meta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
                    if (meta) meta.setAttribute('content', cfg.pwaTitle);
                }

                // CSS custom property overrides (base/default values)
                if (cfg.css) {
                    const root = document.documentElement;
                    for (const [prop, value] of Object.entries(cfg.css)) {
                        root.style.setProperty(prop, value);
                    }
                }

                // CSS custom property overrides per media query
                // These are injected as a <style> block so media queries work correctly
                if (cfg.cssMedia) {
                    let mediaCSS = '';
                    for (const [query, vars] of Object.entries(cfg.cssMedia)) {
                        let declarations = '';
                        for (const [prop, value] of Object.entries(vars)) {
                            declarations += `  ${prop}: ${value} !important;\n`;
                        }
                        mediaCSS += `@media ${query} {\n  :root {\n${declarations}  }\n}\n`;
                    }
                    if (mediaCSS) {
                        const style = document.createElement('style');
                        style.textContent = mediaCSS;
                        document.head.appendChild(style);
                    }
                }

                console.log('Site config loaded:', cfg.title || '(no title override)');
            } catch (e) {
                console.log('Site config not available, using defaults:', e.message);
                applyBootImage(null);
            }
        }

        // ===========================================
        // LOAD MANIFEST
        // ===========================================
        async function loadManifest() {
            PerfMonitor.start('manifest-load');
            try {
                const response = await fetch('/manifest.json');
                if (!response.ok) throw new Error('Failed to load manifest.json');
                manifest = await response.json();
                perfOverrides = manifest.perfOverrides || {};
                mediaBase = manifest.terrain.mediaBase || '';
                PerfMonitor.end('manifest-load', `${manifest.nodes?.length || 0} nodes`);
                console.log('Manifest loaded:', manifest.terrain.title, mediaBase ? `(media: ${mediaBase})` : '(local media)');
                
                // Preload home node into persistent cache (never evicted)
                preloadHomeNode();
                
                // Load navigator state after manifest is loaded
                loadNavigatorState();

                afterManifestLoad();
                
            } catch (error) {
                console.error('Error loading manifest:', error);
                viewport.innerHTML = `<div class="error">Error loading manifest.json<br><small>${error.message}</small></div>`;
            }
        }

        // ===========================================
        // ADDRESS NORMALIZATION
        // ===========================================
        function normalizeAddress(input) {
            // Remove @ if present at start
            let addr = input.startsWith('@') ? input.slice(1) : input;
            
            // Split on decimal
            let parts = addr.split('.');
            let main = parts[0] || '0';
            let subRaw = parts[1] || '0';
            
            // Pad main to 4 digits
            main = main.padStart(4, '0');
            
            // Allow 1-2 digits after decimal (no float parsing)
            let sub = subRaw.slice(0, 2);
            if (sub.length === 0) sub = '0';
            
            return `${main}.${sub}`;
        }

        // ===========================================
        // NODE NAVIGATION
        // ===========================================
        function markStarted() {
            if (appStarted) return;
            appStarted = true;
            if (startHomeBtn) {
                renderStartHomeButton('home');
                startHomeBtn.classList.remove('highlighted');
                startHomeBtn.classList.remove('awaiting-start');
            }
        }

        function resolveNode(nodeId) {
            if (!manifest) return null;
            const node = manifest.nodes.find(n => n.id === nodeId);
            if (!node) console.error('Node not found:', nodeId);
            return node || null;
        }

        function teardownCurrentNode() {
            const textOverlay = document.getElementById('textOverlay');
            if (textOverlay?.classList.contains('active')) {
                wasPlayingBeforeTextOverlay = false;
                textOverlay.classList.remove('active');
            }

            Timers.clearAll();

            activeInterruptibles = [];
            stopProgressUpdates();
            clearProgressBar();

            // Clear audio handlers before stopping audio
            primaryAudio.onended = null;
            primaryAudio.ontimeupdate = null;
            primaryAudio.onloadedmetadata = null;

            transitionAudioA.onended = null;
            transitionAudioA.ontimeupdate = null;
            transitionAudioA.onloadedmetadata = null;

            transitionAudioB.onended = null;
            transitionAudioB.ontimeupdate = null;
            transitionAudioB.onloadedmetadata = null;

            stopAllContentAudio();
            currentPlaylist = null;
            audioManualState = null;

            // Teardown video if active
            teardownVideo();

            // Teardown YouTube if active
            teardownYouTube();

            // Cleanup timed video and scheduled visual timers (force=true to override persist)
            cleanupTimedVideo(true);
            clearTimedVisualSchedule();

            // Reset carousel state for next node
            hideCarousel();
        }

        function prepareNode(node) {
            // Add to navigator tracking
            addToNavigator(node);

            // YOUTUBE NODE: Show poster and wait for GO key
            if (node.video && node.video.youtubeId) {
                prepareYouTube(node);
                return;
            }

            // VIDEO NODE: Load video and show poster
            if (node.video && node.video.src) {
                console.log('Preparing video node:', node.id);
                
                // Show start poster image (resolve URL - posters may be on R2 with videos)
                if (node.video.poster) {
                    crossfadeToImage(resolveMediaUrl(node.video.poster), node.id);
                }
                
                // Preload video (muted until user starts it)
                viewportVideo.src = resolveMediaUrl(node.video.src);
                viewportVideo.muted = true;
                viewportVideo.load();
                
                // Setup ended handler
                setupVideoEndHandler();
                
                // Set state to loading (will become ready when metadata loads)
                videoState = 'loading';
                
                // When video metadata loads, update progress display and set ready
                viewportVideo.onloadedmetadata = () => {
                    console.log('Video metadata loaded, duration:', viewportVideo.duration);
                    videoState = 'ready';
                    updateProgressBar(); // Show 0:00 / duration
                    updatePauseIcon();
                };
                
                // Links still work on video nodes
                updateLinks(node.links || []);
                return;
            }

            // Visuals / Images
            // If node.images[] exists, we treat it as a carousel and display images[0] by default.
            // Otherwise we fall back to node.visuals[] behavior.
            const usedCarousel = showCarouselForNode(node);
            if (!usedCarousel) {
                // Visuals
                if (node.visuals && node.visuals.length > 0) {
                    const visual = node.visuals[0];
                    if (visual.type === 'image') {
                        crossfadeToImage(visual.src, node.id);
                    } else if (visual.type === 'image_bundle') {
                        // Select image from bundle based on mode
                        const selectedImage = selectImageBundleFile(
                            visual.files, 
                            visual.mode || 'random_tracked', 
                            node.id
                        );
                        if (selectedImage) {
                            crossfadeToImage(selectedImage, node.id);
                        }
                    } else if (visual.type === 'video') {
                        // Use timed video system (synced to primary audio)
                        setupTimedVideo(visual.src, visual.start || 0, visual.duration || 0, visual.poster, visual.loop, visual.persist);
                    }

                    lastTimedVisualKey = timedVisualKey(visual);
                    
                    // Additional timed visuals are driven by checkTimedVisuals() on the audio clock
                    scheduleTimedVisuals(node);
                }
            }

            // Links
            updateLinks(node.links || []);
        }

        function enterNode(node, versionAtEnter) {
            // YOUTUBE NODE: Skip audio setup, YouTube waits for GO key
            if (node.video && node.video.youtubeId) {
                console.log('YouTube node ready, press GO to start');
                updatePauseIcon();
                return;
            }

            // VIDEO NODE: Skip audio setup, video waits for GO key
            if (node.video && node.video.src) {
                console.log('Video node ready, press GO to start');
                // Progress bar already shows 0:00 / duration from prepareNode
                updatePauseIcon();
                return;
            }
            
            // PRIMARY AUDIO: single / bundle / playlist
            if (node.audio) {
                let audioFile = null;
                let isPlaylist = false;

                if (node.audio.type === 'bundle' && node.audio.files?.length) {
                    audioFile = selectBundleFile(node.audio.files, node.audio.mode, node.id);
                } else if (node.audio.type === 'playlist' && node.audio.source) {
                    isPlaylist = true;
                    loadPlaylist(node.id, resolveMediaUrl(node.audio.source), versionAtEnter);
                } else if (node.audio.primary) {
                    audioFile = node.audio.primary;
                }

                if (audioFile && !isPlaylist) {
                    PerfMonitor.start('audio-load-' + node.id);
                    primaryAudio.src = resolveMediaUrl(audioFile);
                    primaryAudio.loop = isAudioRepeat(node);
                    
                    // Track audio load time
                    const audioLoadHandler = () => {
                        PerfMonitor.end('audio-load-' + node.id);
                        primaryAudio.removeEventListener('canplay', audioLoadHandler);
                        primaryAudio.removeEventListener('error', audioErrorHandler);
                    };
                    
                    // Handle audio load errors
                    const audioErrorHandler = () => {
                        PerfMonitor.end('audio-load-' + node.id);
                        PerfMonitor.warn(`Audio load error for ${node.id}: ${primaryAudio.error?.message || 'unknown'}`);
                        primaryAudio.removeEventListener('canplay', audioLoadHandler);
                        primaryAudio.removeEventListener('error', audioErrorHandler);
                    };
                    
                    primaryAudio.addEventListener('canplay', audioLoadHandler);
                    primaryAudio.addEventListener('error', audioErrorHandler);

                    const timingDelay = node.audio.primaryTiming || 0;

                    // Manual start: load audio but wait for GO button
                    if (node.audio.manualStart) {
                        audioManualState = 'ready';
                        progressBar.style.width = '0%';
                        progressText.textContent = 'Press ✓ to play audio';
                        startProgressUpdates();
                    } else {
                        const startPrimary = withNavGuard(() => {
                            primaryAudio.play().catch(e => console.log('Audio autoplay prevented:', e));
                            startProgressUpdates();
                            // Also start timed video if present - ensure it's synced to audio start
                            if (timedVideo && timedVideo.parentNode) {
                                timedVideo.currentTime = 0;
                                timedVideo.play().catch(e => console.log('Timed video play failed:', e));
                            }
                        }, versionAtEnter);

                        if (timingDelay > 0) Timers.setTimeout(startPrimary, timingDelay);
                        else startPrimary();
                    }
                }
            }

            // AUX1
            if (node.audio?.aux1) {
                // Reset any existing crossfade state
                if (aux1CrossfadeInterval) {
                    Timers.clearInterval(aux1CrossfadeInterval);
                    aux1CrossfadeInterval = null;
                }
                aux1CrossfadeAudio.pause();
                aux1CrossfadeAudio.src = '';

                aux1Audio.src = resolveMediaUrl(node.audio.aux1);
                const crossfadeDuration = node.audio.aux1Crossfade || 0;

                if (crossfadeDuration > 0) {
                    aux1Audio.loop = false;
                    setupAux1Crossfade(resolveMediaUrl(node.audio.aux1), crossfadeDuration);
                } else {
                    aux1Audio.loop = true;
                }

                const safariAuxDelay = isSafari && node.audio?.primary ? getPerfOverride('safariAuxDelayMs') : 0;
                const auxDelay = (node.audio.aux1Timing || 0) + safariAuxDelay;
                const aux1FadeIn = node.audio.aux1FadeIn !== undefined ? node.audio.aux1FadeIn : AUX_FADE_DURATION;
                const startAux = withNavGuard(() => fadeInAux(aux1Audio, 1.0, aux1FadeIn), versionAtEnter);
                if (auxDelay > 0) Timers.setTimeout(startAux, auxDelay);
                else startAux();
            } else {
                aux1Audio.src = '';
                if (aux1CrossfadeInterval) {
                    Timers.clearInterval(aux1CrossfadeInterval);
                    aux1CrossfadeInterval = null;
                }
            }

            // For aux1-only nodes (no primary audio), show guidance message directly
            if (!node.audio?.primary && (node.audio?.aux1 || (node.choices && node.choices.length > 0))) {
                progressBar.style.width = '0%';
                progressText.textContent = 'Make a choice when ready';
                
                // Start timed video if present (no primary audio to trigger it)
                if (timedVideo && timedVideo.parentNode) {
                    timedVideo.currentTime = 0;
                    timedVideo.play().catch(e => console.log('Timed video play failed (aux1-only):', e));
                }
            }

            // DESTINATION autoNext behavior (transition semantics); repeat takes precedence
            if (node.type === 'destination' && node.autoNext && node.audio?.primary && !isAudioRepeat(node)) {
                const transitionTiming = node.transition?.timing || 0;

                const goNext = withNavGuard(() => {
                    stopProgressUpdates();
                    playTransitionThen(
                        withNavGuard(() => loadNode(node.autoNext), versionAtEnter),
                        node
                    );
                }, versionAtEnter);

                if (transitionTiming < 0 && node.transition?.audio) {
                    primaryAudio.ontimeupdate = withNavGuard(() => {
                        if (primaryAudio.duration > 0) {
                            const remaining = primaryAudio.duration - primaryAudio.currentTime;
                            const prerollSeconds = Math.abs(transitionTiming) / 1000;
                            if (remaining <= prerollSeconds) {
                                primaryAudio.ontimeupdate = null;
                                goNext();
                            }
                        }
                    }, versionAtEnter);
                } else {
                    safeSetOnEnded(primaryAudio, goNext, versionAtEnter);
                }
            }
            
            // Preload assets for adjacent nodes AFTER current audio is ready
            // This prevents preloading from stealing bandwidth from current content
            const nodeIdForPreload = node.id; // Capture for closure
            let preloadTriggered = false;
            
            const triggerPreload = () => {
                if (preloadTriggered) return; // Guard against double-trigger
                preloadTriggered = true;
                preloadAdjacentNodes(node);
            };
            
            if (node.audio?.primary || (node.audio?.type === 'bundle' && node.audio?.files?.length)) {
                // Wait for current audio to be ready before preloading
                const preloadOnceReady = () => {
                    primaryAudio.removeEventListener('canplay', preloadOnceReady);
                    // Add small delay to let audio streaming stabilize
                    const delay = isSafari ? getPerfOverride('safariPreloadDelayMs') : 500;
                    setTimeout(triggerPreload, delay);
                };
                primaryAudio.addEventListener('canplay', preloadOnceReady);
                
                // Fallback: preload after 5 seconds even if audio hasn't loaded
                const fallbackDelay = isSafari ? getPerfOverride('safariPreloadFallbackMs') : 5000;
                setTimeout(() => {
                    primaryAudio.removeEventListener('canplay', preloadOnceReady);
                    triggerPreload();
                }, fallbackDelay);
            } else {
                // No audio on this node, preload after short delay
                const delay = isSafari ? getPerfOverride('safariPreloadDelayMs') : 1000;
                setTimeout(triggerPreload, delay);
            }

            updatePauseIcon();
        }

        function loadNode(nodeId) {
            PerfMonitor.start('loadNode-total');
            if (!manifest) return;
            markStarted();

            nodeEnterWallTime = Date.now();
            lastTimedVisualKey = null;

            // If we're leaving the initial loading phase, cancel the start fallback timer.
            if (startFallbackTimeoutId) {
                Timers.clearTimeout(startFallbackTimeoutId);
                startFallbackTimeoutId = null;
            }

            PerfMonitor.start('resolveNode');
            const node = resolveNode(nodeId);
            PerfMonitor.end('resolveNode');
            if (!node) return;

            if (isConvoMode() && nodeId !== manifest?.terrain?.startNode) {
                convoAtLobby = false;
            }

            // Track the user's path through the installation (including autoNext and Index jumps)
            recordHistory(node.id);

            // New node load = new version (invalidates stale callbacks)
            const versionAtEnter = bumpNavVersion();

            // Clear bookmark if navigating via auto-advance (not via DEL return)
            if (currentNode && currentNode.type === 'destination' && currentNode.autoNext === nodeId) {
                audioBookmark = null;
            }

            currentNode = node;
            console.log('Loading node:', node.id, node.title);

            // Clean up preload cache - remove entries not relevant to new node
            // Keep: current node, forward choices, and recent history (for backward navigation)
            const relevantNodes = new Set(getAdjacentNodeIds(node));
            relevantNodes.add(node.id); // Keep current node if preloaded
            
            // Also keep recent session history nodes for backward navigation
            // Keep last 3 nodes from history to allow stepping back without re-fetching
            const historyToKeep = sessionHistory.slice(-3);
            historyToKeep.forEach(nodeId => relevantNodes.add(nodeId));
            
            // Remove image cache entries not in relevant set
            for (const cachedId of preloadCache.images.keys()) {
                if (!relevantNodes.has(cachedId)) {
                    preloadCache.images.delete(cachedId);
                }
            }
            
            // Remove audio cache entries not in relevant set
            for (const cachedId of preloadCache.audio.keys()) {
                if (!relevantNodes.has(cachedId)) {
                    const cached = preloadCache.audio.get(cachedId);
                    if (cached?.element) {
                        cached.element.src = ''; // Stop any loading
                    }
                    preloadCache.audio.delete(cachedId);
                }
            }

            PerfMonitor.start('teardownCurrentNode');
            teardownCurrentNode();
            PerfMonitor.end('teardownCurrentNode');
            
            PerfMonitor.start('prepareNode');
            prepareNode(node);
            PerfMonitor.end('prepareNode', node.id);
            
            PerfMonitor.start('enterNode');
            enterNode(node, versionAtEnter);
            PerfMonitor.end('enterNode', node.id);
            
            PerfMonitor.end('loadNode-total', node.id);
        }

        function playTransitionThen(callback, transitionNode = currentNode) {
            PerfMonitor.start('transition');
            const versionAtSchedule = navVersion;
            const originalCallback = callback;
            const guardedCallback = withNavGuard(() => {
                PerfMonitor.end('transition', transitionNode?.id || 'unknown');
                originalCallback();
            }, versionAtSchedule);

            // Stop all content audio first
            stopAllContentAudio();
            stopCarouselAutoAdvance(); // Freeze image carousel during transition
            
            // Allow passing a custom transition object
            let transition;
            if (transitionNode && transitionNode.transition) {
                // It's a node with a transition property
                transition = transitionNode.transition;
            } else if (transitionNode && transitionNode.audio) {
                // Assume it's a transition object itself (has audio property)
                transition = transitionNode;
            } else {
                // Fallback: try to get transition from node
                transition = transitionNode?.transition;
            }
            
            // Determine which audio file to use (bundle or single)
            let transitionAudioFile = null;
            
            if (transition && transition.type === 'bundle' && transition.files && transition.files.length > 0) {
                // BUNDLE TRANSITION: Select file based on mode
                const nodeId = transitionNode?.id || 'transition';
                transitionAudioFile = selectBundleFile(transition.files, transition.mode, `${nodeId}_transition`);
            } else if (transition && transition.audio) {
                // SINGLE TRANSITION: Use the audio property
                transitionAudioFile = transition.audio;
            }
            
            if (transitionAudioFile) {
                // Select the transition element that's NOT currently in use
                const transitionAudio = useTransitionA ? transitionAudioA : transitionAudioB;
                useTransitionA = !useTransitionA; // Flip for next time
                
                // Clear any lingering handlers from previous use
                transitionAudio.onended = null;
                transitionAudio.onloadedmetadata = null;
                transitionAudio.ontimeupdate = null;
                
                // Set up the new transition
                transitionAudio.src = resolveMediaUrl(transitionAudioFile);
                
                // Apply volume adjustment if specified
                const volumeAdjustment = transition.volume || 0;
                transitionAudio.volume = dbToVolume(volumeAdjustment);
                
                const timingOffset = transition.timing || 0;
                
                // Start playing the transition
                transitionAudio.play().catch(e => {
                    console.log('Transition audio failed:', e);
                    guardedCallback();
                    return;
                });
                
                // Calculate when to trigger the callback (load next node)
                if (timingOffset === 0) {
                    // Standard behavior: wait for transition to end
                    safeSetOnEnded(transitionAudio, guardedCallback, versionAtSchedule);
                } else {
                    // Calculate delay for callback
                    let callbackDelay;
                    
                    // Wait for transition metadata to load so we know its duration
                    if (transitionAudio.duration && !isNaN(transitionAudio.duration)) {
                        // Duration already known
                        callbackDelay = calculateCallbackDelay(transitionAudio.duration, timingOffset);
                        Timers.setTimeout(guardedCallback, callbackDelay);
                    } else {
                        // Wait for metadata to load
                        transitionAudio.onloadedmetadata = withNavGuard(() => {
                            callbackDelay = calculateCallbackDelay(transitionAudio.duration, timingOffset);
                            console.log('Transition overlap - duration:', transitionAudio.duration, 
                                       'offset:', timingOffset, 'delay:', callbackDelay);
                            Timers.setTimeout(guardedCallback, callbackDelay);
                        }, versionAtSchedule);
                    }
                    
                    // No backup onended handler - let it just play out naturally
                    // The setTimeout handles the callback timing
                }
            } else {
                guardedCallback();
            }
        }

        function calculateCallbackDelay(transitionDuration, timingOffset) {
            const durationMs = transitionDuration * 1000;
            
            if (timingOffset > 0) {
                // Positive: start next node X ms after transition begins
                return timingOffset;
            } else {
                // Negative: start next node X ms before transition ends
                // For example: 3000ms transition, -500ms offset = start at 2500ms
                return Math.max(0, durationMs + timingOffset); // clamp to avoid negative delay
            }
        }

        function updateLinks(links) {
            linksArea.innerHTML = '';

            // Text overlay button first
            if (currentNode?.text?.trim() && currentNode?.textTitle?.trim()) {
                const textDocBtn = document.createElement('button');
                textDocBtn.className = 'text-doc-link';
                textDocBtn.textContent = currentNode.textTitle.trim();
                textDocBtn.addEventListener('click', () => {
                    openTextOverlay(currentNode.text);
                });
                linksArea.appendChild(textDocBtn);
            }
            
            // Node-specific external links
            links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url;
                a.target = '_blank';
                a.className = 'external-link';
                a.textContent = link.text;
                linksArea.appendChild(a);
            });
            
            // Add share link if node is shareable (default: true unless explicitly false)
            if (currentNode && currentNode.shareable !== false) {
                let shareUrl = null;
                if (isConvoMode()) {
                    shareUrl = getShareUrlForNode(currentNode.id);
                    if (!shareUrl && currentNode.addressable !== false) {
                        shareUrl = `${window.location.origin}${window.location.pathname}#node=${encodeURIComponent(currentNode.id)}`;
                    }
                } else if (currentNode.addressable !== false) {
                    shareUrl = `${window.location.origin}${window.location.pathname}#node=${encodeURIComponent(currentNode.id)}`;
                }

                if (shareUrl) {
                const shareEl = document.createElement('span');
                shareEl.className = 'share-link';
                shareEl.textContent = 'Share this node';
                shareEl.addEventListener('click', () => {
                    // Try native share API first (mobile), fall back to clipboard
                    if (navigator.share) {
                        navigator.share({
                            title: currentNode.title || 'Terrain',
                            url: shareUrl
                        }).catch(() => {
                            // User cancelled or share failed - fall back to clipboard
                            copyShareLink(shareEl, shareUrl);
                        });
                    } else {
                        copyShareLink(shareEl, shareUrl);
                    }
                });
                linksArea.appendChild(shareEl);
                }
            }
        }

        function copyShareLink(el, url) {
            navigator.clipboard.writeText(url).then(() => {
                const originalText = el.textContent;
                el.textContent = 'Link copied';
                el.classList.add('copied');
                setTimeout(() => {
                    el.textContent = originalText;
                    el.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                // Clipboard API failed - show URL as fallback
                prompt('Copy this link:', url);
            });
        }

        // ===========================================
        // TEXT OVERLAY - Markdown Document Viewer
        // ===========================================
        
        function openTextOverlay(markdownText) {
            const overlay = document.getElementById('textOverlay');
            const contentDiv = document.getElementById('textOverlayContent');
            
            contentDiv.innerHTML = parseMarkdown(markdownText);
            overlay.classList.add('active');
            
            // Pause audio when reading
            if (!primaryAudio.paused) {
                primaryAudio.pause();
                wasPlayingBeforeTextOverlay = true;
            } else {
                wasPlayingBeforeTextOverlay = false;
            }
        }
        
        function closeTextOverlay() {
            const overlay = document.getElementById('textOverlay');
            if (!overlay || !overlay.classList.contains('active')) return;
            overlay.classList.remove('active');
            
            // Resume audio if it was playing
            if (wasPlayingBeforeTextOverlay && currentNode) {
                primaryAudio.play().catch(e => console.log('Audio resume prevented:', e));
            }
            wasPlayingBeforeTextOverlay = false;
        }
        
        let wasPlayingBeforeTextOverlay = false;
        
        function parseMarkdown(md) {
            if (!md) return '';
            
            let html = md
                // Escape HTML characters
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                
                // Code blocks (must be before inline code)
                .replace(/```([\w]*)([\s\S]*?)```/g, '<pre><code class="language-$1">$2</code></pre>')
                
                // Inline code
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                
                // Headers
                .replace(/^###### (.*$)/gim, '<h6>$1</h6>')
                .replace(/^##### (.*$)/gim, '<h5>$1</h5>')
                .replace(/^#### (.*$)/gim, '<h4>$1</h4>')
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                
                // Blockquote
                .replace(/^\> (.*$)/gim, '<blockquote><p>$1</p></blockquote>')
                
                // Horizontal rule
                .replace(/^\-{3,}|\*{3,}|\_{3,}$/gim, '<hr>')
                
                // Bold and italic
                .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/___(.*?)___/g, '<strong><em>$1</em></strong>')
                .replace(/__(.*?)__/g, '<strong>$1</strong>')
                .replace(/_(.*?)_/g, '<em>$1</em>')
                
                // Links
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                
                // Unordered list
                .replace(/^\- (.*$)/gim, '<li>$1</li>')
                .replace(/^\* (.*$)/gim, '<li>$1</li>')
                
                // Ordered list
                .replace(/^\d+\. (.*$)/gim, '<li>$1</li>');
            
            // Wrap consecutive list items in ul/ol
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
            
            // Fix double-wrapped list items
            html = html.replace(/<ul>(.*)<li>(.*)<\/li>(.*)<\/ul>/gs, '<ul><li>$2</li></ul>');
            
            // Paragraphs (must be last)
            const blocks = html.split('\n\n');
            html = blocks.map(block => {
                block = block.trim();
                if (!block) return '';
                if (block.match(/^<(?:h|p|ul|ol|li|blockquote|pre|hr)/)) return block;
                return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
            }).join('\n\n');
            
            return html;
        }


        function crossfadeToImage(newSrc, nodeId = null) {
            const resolvedSrc = resolveMediaUrl(newSrc);
            PerfMonitor.start('crossfade-' + resolvedSrc.split('/').pop());
            const imageA = document.getElementById('viewportImageA');
            const imageB = document.getElementById('viewportImageB');
            
            // Determine which image is currently active
            const activeImage = imageA.classList.contains('active') ? imageA : imageB;
            const inactiveImage = activeImage === imageA ? imageB : imageA;
            
            // Function to start the fade-in AFTER image is fully loaded on the element
            const startFadeIn = (loadTime) => {
                if (loadTime > 100) {
                    PerfMonitor.warn(`Image load took ${loadTime}ms: ${resolvedSrc.split('/').pop()}`);
                }
                
                // Image is now loaded on the element - safe to bring it on top and fade in
                inactiveImage.style.zIndex = '2';
                
                // Force reflow before enabling transition
                void inactiveImage.offsetWidth;
                
                // Re-enable transition and fade IN
                inactiveImage.style.transition = '';
                inactiveImage.style.opacity = '1';
                
                // After transition completes, swap active state and reset z-index
                setTimeout(() => {
                    activeImage.classList.remove('active');
                    activeImage.style.zIndex = '';
                    
                    inactiveImage.classList.add('active');
                    inactiveImage.style.zIndex = '';
                    PerfMonitor.end('crossfade-' + resolvedSrc.split('/').pop());
                }, 420);
            };
            
            // Step 1: Remove any pending load handlers from previous crossfade calls
            // This prevents listener accumulation if crossfadeToImage is called rapidly
            if (inactiveImage._pendingLoadHandler) {
                inactiveImage.removeEventListener('load', inactiveImage._pendingLoadHandler);
                inactiveImage._pendingLoadHandler = null;
            }
            if (inactiveImage._pendingErrorHandler) {
                inactiveImage.removeEventListener('error', inactiveImage._pendingErrorHandler);
                inactiveImage._pendingErrorHandler = null;
            }
            
            // Step 2: Prepare the inactive layer - hidden and below
            inactiveImage.style.transition = 'none';
            inactiveImage.style.opacity = '0';
            inactiveImage.style.zIndex = '0';  // Keep below active layer while loading
            void inactiveImage.offsetWidth;  // Force reflow
            
            // Step 3: Set the new source on the element
            inactiveImage.src = resolvedSrc;
            
            // Step 4: Wait for image to load on the element before fading in
            // This prevents flash of old content - we only raise z-index after new image is ready
            const loadStart = performance.now();
            
            if (inactiveImage.complete && inactiveImage.naturalWidth > 0) {
                // Image already loaded (browser cache hit)
                startFadeIn(0);
            } else {
                // Wait for load event
                const onLoad = () => {
                    inactiveImage.removeEventListener('load', onLoad);
                    inactiveImage.removeEventListener('error', onError);
                    inactiveImage._pendingLoadHandler = null;
                    inactiveImage._pendingErrorHandler = null;
                    const loadTime = Math.round(performance.now() - loadStart);
                    startFadeIn(loadTime);
                };
                const onError = () => {
                    inactiveImage.removeEventListener('load', onLoad);
                    inactiveImage.removeEventListener('error', onError);
                    inactiveImage._pendingLoadHandler = null;
                    inactiveImage._pendingErrorHandler = null;
                    PerfMonitor.warn(`Image failed to load: ${resolvedSrc}`);
                };
                // Store references so we can remove them if crossfade is called again
                inactiveImage._pendingLoadHandler = onLoad;
                inactiveImage._pendingErrorHandler = onError;
                inactiveImage.addEventListener('load', onLoad);
                inactiveImage.addEventListener('error', onError);
            }
        }

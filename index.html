<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <base href="/">
    <title>Sigmon - A Set of Something</title>
    
    <!-- PWA Support -->
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#242424">
    
    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Terrain">
    <link rel="apple-touch-icon" href="/assets/images/icons/icon-180.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===========================================
           COLOR PALETTE - Easy to customize
           =========================================== */
        :root {
            --neo-surface: #2a2d30;
            --neo-surface-light: #32363a;
            --neo-surface-dark: #1e2124;
            --shadow-inset: inset 5px 5px 10px var(--neo-surface-dark), inset -4px -4px 10px var(--neo-surface-light);
            --shadow-raised: 5px 5px 10px var(--neo-surface-dark), -4px -4px 10px var(--neo-surface-light);
            --shadow-inset-soft: inset 3px 3px 6px var(--neo-surface-dark), inset -2px -2px 6px var(--neo-surface-light);
            --bg-main: #15161a;
            --bg-viewport: #0d0e10;
            --bg-button: var(--neo-surface);
            --bg-button-hover: #32363a;
            --bg-button-active: #1e2124;
            --bg-button-transport: var(--accent-primary);
            --bg-button-transport-hover: var(--accent-primary-hover);
            --border-button: #3a3e42;
            --text-primary: #ffffff;
            --text-dim: #b3b3b3;
            --accent-primary: #e6e6e6;
            --accent-primary-hover: #ffffff;
            --accent-primary-glow: rgba(230, 230, 230, 0.35);
            --accent-green: var(--accent-primary);
            --accent-green-glow: var(--accent-primary-glow);
            /* Progress fill + link hovers — neutral gray (not keypad accent) */
            --progress-fill: #a8abb2;
            --link-hover-accent: #c8ccd2;
            --accent-blue: #5a7a8c;
            --accent-red: #8c5a5a;
            --input-bg: var(--neo-surface-dark);
            --input-border: #3a3e42;
            --input-active-border: var(--accent-primary);
            --bg-panel: #2a2a2a;
            --bg-input: #2a2a2a;
            --border: #444444;
            /* BASE FONT CONTROLS - Adjust these to scale all UI text */
            --font-size-base: 28px;
            --font-weight-base: 800;
        }

        /* ===========================================
           RESET & BASE
           =========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: var(--font-size-base);
            -webkit-text-size-adjust: 100%;
            -moz-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            background-color: var(--bg-main);
            background-image: none;
            color: var(--text-primary);
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: var(--font-weight-base);
            letter-spacing: -0.02em;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ===========================================
           MAIN CONTAINER
           =========================================== */
        .terrain-container {
            display: grid;
            grid-template-columns: 100px 1fr;
            grid-template-rows: auto auto;
            gap: 15px;
            max-width: 1100px;
            width: 100%;
        }

        /* ===========================================
           LEFT SIDEBAR (Logo + Start/Home)
           =========================================== */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .logo {
            display: none;
        }

        /* Sidebar icon buttons (Start/Home + Index) */
        .start-home-btn {
            background: var(--bg-button);
            border: none;
            border-radius: 12px;
            padding: 12px 10px;
            color: var(--text-primary);
            font-size: 0.59rem;
            font-weight: var(--font-weight-base);
            cursor: pointer;
            transition: box-shadow 0.15s ease, transform 0.1s ease;
            box-shadow: var(--shadow-raised);
        }

        .start-home-btn:hover {
            filter: brightness(1.05);
        }

        .start-home-btn:active {
            box-shadow: var(--shadow-inset-soft);
            transform: translateY(1px);
        }

        .start-home-btn.highlighted {
            box-shadow: var(--shadow-raised), 0 0 18px var(--accent-green-glow);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px var(--accent-green-glow); }
            50% { box-shadow: 0 0 20px var(--accent-green-glow); }
        }

        .index-btn {
            background: var(--bg-button);
            border: none;
            padding: 0;
            color: var(--text-primary);
            cursor: pointer;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: box-shadow 0.15s ease, transform 0.1s ease;
            opacity: 0.95;
            box-shadow: var(--shadow-raised);
        }

        .index-btn:hover {
            opacity: avoidToyLikeOpacityClamp(1.0); /* harmless if you remove; see note below */
            opacity: 1;
        }

        .index-btn:active {
            transform: translateY(1px);
            opacity: 0.85;
        }

        .index-btn svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .index-btn:focus-visible {
            outline: 2px solid var(--border-button);
            outline-offset: 6px;
            border-radius: 10px;
        }

        /* ===========================================
           NAVIGATOR OVERLAY
           =========================================== */
        .navigator-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.80);
            z-index: 1000;
            display: none;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .navigator-overlay.active {
            display: block;
        }

        .navigator-container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(42, 42, 42, 0.95);
            border-radius: 8px;
            padding: 30px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .navigator-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .navigator-title {
            font-size: 1.09rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .close-btn {
            background: var(--accent-primary);
            border: none;
            border-radius: 6px;
            padding: 8px;
            color: var(--bg-main);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn svg {
            width: 20px;
            height: 20px;
        }

        .close-btn:hover {
            opacity: 0.8;
        }

        .navigator-section {
            margin-bottom: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--bg-input);
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.2s ease;
        }

        .section-header:hover {
            background: var(--border);
        }

        .section-title {
            font-size: 0.82rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .section-count {
            font-size: 0.64rem;
            color: var(--text-dim);
        }

        .section-content {
            padding: 10px;
            display: none;
        }

        .section-content.expanded {
            display: block;
        }

        .breadcrumb-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .breadcrumb-item {
            background: var(--bg-input);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.59rem;
            color: var(--text-primary);
        }

        .breadcrumb-arrow {
            color: var(--text-dim);
            font-size: 0.73rem;
        }

        .controls-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-label {
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            font-weight: var(--font-weight-base);
        }

        .control-select {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-size: 0.64rem;
            cursor: pointer;
        }

        .control-input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-size: 0.64rem;
            min-width: 200px;
        }

        .export-btn {
            background: var(--accent-green);
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            color: var(--bg-main);
            font-size: 0.64rem;
            font-weight: var(--font-weight-base);
            cursor: pointer;
            transition: all 0.2s ease;
            align-self: flex-end;
        }

        .export-btn:hover {
            opacity: 0.8;
        }

        .index-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .index-item {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            transition: all 0.2s ease;
        }

        .index-item:hover {
            border-color: var(--accent-green);
        }

        .index-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .index-item-info {
            flex: 1;
        }

        .index-item-id {
            font-family: monospace;
            font-size: 0.73rem;
            color: var(--accent-green);
            font-weight: var(--font-weight-base);
            margin-bottom: 5px;
        }

        .index-item-title {
            font-size: 0.68rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .index-item-meta {
            display: flex;
            gap: 15px;
            font-size: 0.55rem;
            color: var(--text-dim);
            font-weight: 300;
            letter-spacing: 0.01em;
        }

        .index-item-tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .tag-badge {
            background: var(--accent-blue);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.5rem;
            color: white;
        }

        .index-item-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: var(--accent-green);
            border: none;
            border-radius: 6px;
            width: 44px;
            height: 44px;
            padding: 0;
            color: var(--bg-main);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn svg {
            width: 24px;
            height: 24px;
        }

        /* Play triangle larger to fill button */
        .action-btn.go svg {
            width: 36px;
            height: 36px;
        }

        .action-btn:hover {
            opacity: 0.8;
        }

        .action-btn.delete {
            background: var(--accent-red);
            border-color: var(--accent-red);
            color: var(--bg-main);
        }

        .note-input {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 8px;
            color: var(--text-primary);
            font-size: 0.59rem;
            margin-top: 10px;
            resize: vertical;
            min-height: 60px;
        }

        .note-input:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
            font-size: 0.64rem;
            letter-spacing: 0;
        }

        /* ===========================================
           NAVIGATOR - MOBILE
           =========================================== */
        @media (max-width: 768px) {
            .navigator-overlay {
                padding: 20px 12px;
                /* iOS safe areas */
                padding-top: max(20px, env(safe-area-inset-top));
                padding-right: max(12px, env(safe-area-inset-right));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
                padding-left: max(12px, env(safe-area-inset-left));
            }
            
            .navigator-container {
                padding: 15px;
                max-width: 100%;
                box-sizing: border-box;
            }
            
            .navigator-header {
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .navigator-title {
                font-size: 1.2rem;
            }
            
            .index-item {
                padding: 12px;
            }
            
            .index-item-header {
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .index-item-info {
                min-width: 0;
                flex: 1 1 60%;
            }
            
            .index-item-actions {
                flex-shrink: 0;
            }
            
            .action-btn {
                width: 38px;
                height: 38px;
            }
            
            .action-btn svg {
                width: 20px;
                height: 20px;
            }
            
            .action-btn.go svg {
                width: 31px;
                height: 31px;
            }
            
            .close-btn {
                padding: 6px;
            }
            
            .close-btn svg {
                width: 18px;
                height: 18px;
            }
            
            .index-item-meta {
                flex-wrap: wrap;
                gap: 8px;
            }
        }

        /* ===========================================
           VIEWPORT
           =========================================== */
        .viewport-area {
            grid-column: 2;
        }

        .viewport {
            background: var(--bg-viewport);
            aspect-ratio: 16 / 9;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.09rem;
            color: var(--text-dim);
            letter-spacing: 4px;
            position: relative;
            overflow: hidden;
            border-radius: 14px;
            flex-shrink: 0;
            box-shadow: var(--shadow-inset);
            border: 1px solid rgba(0, 0, 0, 0.25);
        }

        .viewport-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.4s ease-in-out; /* 400ms = ~12 frames at 30fps */
        }

        .viewport-image.active {
            z-index: 1;
        }

        .viewport-image:not(.active) {
            z-index: 0;
        }

        .viewport-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 5; /* above images (0-1), below overlays (10+) */
        }

        .viewport video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* YouTube iframe container */
        .youtube-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: none;
        }

        .youtube-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ===========================================
           IMAGE CAROUSEL NAV STRIP (below viewport)
           =========================================== */
        .carousel-nav-strip {
            display: none;  /* shown when active */
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
            margin-top: 2px;
        }

        .carousel-nav-strip.active {
            display: flex;
        }

        .carousel-nav-btn {
            background: transparent;
            border: none;
            padding: 8px;
            color: var(--text-dim);
            opacity: 0.8;
            transition: opacity 0.15s ease;
            cursor: pointer;
        }

        .carousel-nav-btn svg {
            width: 20px;
            height: 20px;
            display: block;
        }

        .carousel-nav-btn:hover { opacity: 1; }
        .carousel-nav-btn:active { opacity: 0.5; }

        .carousel-counter {
            font-size: 0.75rem;
            color: var(--text-dim);
            opacity: 0.85;
            letter-spacing: 0.05em;
            font-variant-numeric: tabular-nums;
            font-weight: var(--carousel-nav-weight, 300);
        }

        .carousel-caption {
            position: absolute;
            left: 12px;
            right: 12px;
            bottom: 62px;
            z-index: 20;
            display: none;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 0.59rem;
            line-height: 1.3;
            color: var(--text-primary);
            text-align: center;
            letter-spacing: 0;
        }

        .carousel-caption.active {
            display: block;
        }

        /* ===========================================
           CONTROLS AREA
           =========================================== */
        .controls-area {
            grid-column: 2;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Input Row */
        .input-row {
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            background: var(--input-bg);
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            height: 50px;
            font-size: 1rem;
            color: var(--text-primary);
            font-family: monospace;
            letter-spacing: 2px;
            text-align: center;
            transition: box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            box-shadow: var(--shadow-inset);
        }

        .input-field.active {
            box-shadow: var(--shadow-inset), 0 0 0 1px var(--input-active-border);
        }

        /* Brief "invalid input" feedback (state-gated keys like * or .) */
        .input-field.invalid {
            border-color: var(--accent-red);
        }

        .progress-bar {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: var(--progress-fill);
            opacity: 0.3;
            width: 0%;
            transition: width 0.1s linear;
            pointer-events: none;
        }

        .progress-text {
            position: relative;
            z-index: 1;
        }

        /* =====================================================
           PROGRESS BAR REFINEMENT (matches existing markup)
           - slimmer bar
           - Inter typography for progress display
           - keep monospace + tracking when typing (active)
           ===================================================== */

        /* Slimmer "bar" (input field) */
        .input-field {
            height: 36px;
            padding: 6px 14px;
            border-radius: 6px;
        }

        /* When NOT typing, make the time readout feel designed */
        .input-field:not(.active) {
            font-family: inherit;     /* Montserrat */
            letter-spacing: -0.02em;
            font-weight: var(--font-weight-base);
        }

        /* When typing, preserve the existing “address entry” feel */
        .input-field.active {
            font-family: monospace;
            letter-spacing: 2px;
            font-weight: var(--font-weight-base);
        }

        /* Slightly calmer fill */
        .progress-bar {
            opacity: 0.22;
        }

        /* Center the text nicely in the slimmer bar */
        .progress-text {
            display: inline-block;
            line-height: 1;
        }
        
        /* Pulsing loading state for buffering heavy media */
        .progress-text.loading-pulse {
            animation: loading-pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes loading-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        @media (max-width: 768px) {
            .input-field {
                height: 40px;
                padding: 8px 14px;
            }
        }

        /* Progress time display */
        .input-field {
          font-size: 0.6rem;   /* try 0.85–0.95rem */
          line-height: 1.2;
        }

        .enter-btn {
            background: var(--bg-button);
            border: 2px solid var(--border-button);
            border-radius: 6px;
            padding: 12px 20px;
            color: var(--text-dim);
            font-size: 0.64rem;
            font-weight: var(--font-weight-base);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .enter-btn.ready {
            color: var(--text-primary);
            border-color: var(--accent-green);
            box-shadow: 0 0 10px var(--accent-green-glow);
        }

        .enter-btn.ready:hover {
            background: var(--accent-green);
            color: #fff;
        }

        .rtn-key {
            background: var(--bg-button-transport);
        }

        .rtn-key.has-bookmark {
            background: var(--accent-blue); /* Different color when return is available */
        }

        /* When no bookmark exists, RTN acts as "Back" if we have session history */
        .rtn-key.has-history {
            background: var(--accent-blue);
        }

        .rtn-key.address-mode {
            background: var(--accent-red); /* Different color in delete mode */
        }

        #rtnDelLabel {
            font-size: 0.64rem;
            font-weight: var(--font-weight-base);
        }

        /* Address Mode Overlay */
        .address-mode-overlay {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Allow clicks to pass through */
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            z-index: 10; /* Above viewport images */
        }

        .address-mode-overlay.active {
            opacity: 1;
        }

        .address-mode-overlay img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        }

        /* Main Controls Row */
        .main-controls {
            display: flex;
            gap: 15px;
        }

        /* Keypad */
        .keypad-and-transport {
            display: flex;
            gap: 8px;
            flex: 0 0 auto;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .key {
            background: var(--bg-button);
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 0.82rem;
            font-weight: var(--font-weight-base);
            color: var(--text-primary);
            cursor: pointer;

            box-shadow: none;
            height: var(--terrain-ui-progress-h);
            padding: 0 14px;
            isolation: isolate;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-field.active {
            box-shadow: none;
        }

        .input-field .progress-frame {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;

        .input-field.active .progress-frame {

        .input-field .progress-bar {

        }

        .input-field .progress-text {
            position: relative;
            z-index: 1;
            color: var(--text-primary);
            display: block;
            line-height: 1;
            margin: 0;
            /* Optical center inside progress-frame PNG */
            transform: translateY(2px);
        }

        .input-field.active .progress-text {
            color: var(--text-primary);
            font-weight: 600;
        }

        .keypad-and-transport {
            padding: 0 !important;
            gap: 0 !important;
        }

        .keypad {
            position: relative;
            width: var(--terrain-ui-keypad-w);
            height: var(--terrain-ui-keypad-h);
            max-width: 100%;
            display: block;
            gap: 0 !important;
            grid-template-columns: unset;
            grid-auto-rows: unset;
        }

        .keypad .key.key-sprite {
            position: absolute;
            width: var(--terrain-ui-key-size);
            height: var(--terrain-ui-key-size);
            padding: 0;
            margin: 0;
            border: none;
            border-radius: 0;
            box-shadow: none;
            background-color: transparent;
            background-repeat: no-repeat;
            background-size: var(--terrain-ui-keypad-sheet-w) var(--terrain-ui-keypad-sheet-h);
            background-image: url('assets/ui/keys-up.png');
            color: transparent;
            font-size: 0;
            line-height: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .keypad .key.key-sprite:active {
            background-image: url('assets/ui/keys-down.png');

        .keypad .key.key-sprite.key-sprite-delete {

        .keypad .key.key-sprite.key-sprite-delete:active {
            background-image: url('assets/ui/keys-down-delete.png');

        .keypad .key.key-sprite.key-sprite-play {
            background-image: url('assets/ui/key-play-up.png');

        .keypad .key.key-sprite.key-sprite-play:active {

            background-position: 0 0 !important;
        }

        .keypad .key.key-sprite.key-sprite-inactive {
            opacity: 0.42;
            cursor: default;
            pointer-events: none;
        }

        .transport {
            display: none;

        .keypad .key.key-sprite.rtn-key.address-mode,
        .keypad .key.key-sprite.rtn-key.has-bookmark,
        .keypad .key.key-sprite.rtn-key.has-history,
        .keypad .key.key-sprite.key-go {
            background-color: transparent;
            filter: none;

        .start-home-btn.terrain-ui-btn,
        .index-btn.terrain-ui-btn {
            width: var(--terrain-ui-sidebar-btn);

        .index-btn.terrain-ui-btn:hover {

        .start-home-btn.terrain-ui-btn:active,
        .index-btn.terrain-ui-btn:active {

</head>
<body>

    <div id="debugHud" style="position:fixed;left:10px;bottom:10px;z-index:2000;background:rgba(0,0,0,0.75);padding:10px;border-radius:8px;font:12px/1.3 monospace;color:#eee;display:none;max-width:60vw;white-space:pre;"></div>

    <script>
        // ===========================================
        // PERFORMANCE MONITORING
        // ===========================================
        const PerfMonitor = {
            enabled: true,  // Set to false to disable all perf logging
            timers: {},
            history: [],
            maxHistory: 100,
            
            start(label) {
                if (!this.enabled) return;
                this.timers[label] = performance.now();
            },
            
            end(label, details = '') {
                if (!this.enabled || !this.timers[label]) return;
                const duration = performance.now() - this.timers[label];
                delete this.timers[label];
                
                const entry = {
                    label,
                    duration: Math.round(duration * 10) / 10,
                    details,
                    timestamp: new Date().toISOString()
                };
                
                this.history.push(entry);
                if (this.history.length > this.maxHistory) {
                    this.history.shift();
                }
                
                // Color code by duration
                const color = duration > 500 ? 'color: red' : 
                              duration > 100 ? 'color: orange' : 
                              'color: green';
                console.log(`%c⏱ ${label}: ${entry.duration}ms ${details}`, color);
                
                return entry.duration;
            },
            
            mark(label) {
                if (!this.enabled) return;
                console.log(`%c📍 ${label}`, 'color: #888');
            },
            
            warn(message) {
                if (!this.enabled) return;
                console.log(`%c⚠️ PERF: ${message}`, 'color: orange; font-weight: bold');
            },
            
            summary() {
                if (!this.history.length) {
                    console.log('No performance data collected yet.');
                    return;
                }
                
                console.group('📊 Performance Summary');
                
                // Group by label
                const byLabel = {};
                this.history.forEach(entry => {
                    if (!byLabel[entry.label]) {
                        byLabel[entry.label] = [];
                    }
                    byLabel[entry.label].push(entry.duration);
                });
                
                // Calculate stats
                Object.keys(byLabel).sort().forEach(label => {
                    const times = byLabel[label];
                    const avg = times.reduce((a, b) => a + b, 0) / times.length;
                    const max = Math.max(...times);
                    const min = Math.min(...times);
                    console.log(`${label}: avg=${avg.toFixed(1)}ms, min=${min}ms, max=${max}ms, count=${times.length}`);
                });
                
                console.groupEnd();
            },
            
            clear() {
                this.history = [];
                this.timers = {};
                console.log('Performance history cleared.');
            }
        };
        
        // Expose to window for console access
        window.PerfMonitor = PerfMonitor;

        // ===========================================
        // STATE
        // ===========================================
        let manifest = null;
        let mediaBase = ''; // Base URL for media assets (from manifest.terrain.mediaBase)
        let currentNode = null;
        let inputValue = '';
        let appStarted = false;
        let isAddressMode = false;
        let isTwoDigitMode = false;
        let twoDigitBuffer = '';
        
        // Audio elements
        let primaryAudio = new Audio();
        let aux1Audio = new Audio();
        let aux1CrossfadeAudio = new Audio(); // For crossfading aux1
        
        // Dual transition audio elements - alternate to avoid tail-chasing
        let transitionAudioA = new Audio();
        let transitionAudioB = new Audio();
        let useTransitionA = true; // Toggle flag
        
        let keySound = new Audio();

        const isSafari = /Safari/.test(navigator.userAgent) &&
            !/Chrome|Chromium|Edg|OPR|Brave|CriOS|FxiOS/.test(navigator.userAgent);

        let aux1CrossfadeInterval = null; // NEW: Track crossfade timer

        let audioBookmark = null; // Stores { nodeId, timestamp } for return navigation
        let activeInterruptibles = []; // Currently available interruptible choices

        let siteConfig = {};
        const DEFAULT_BOOT_IMAGE = 'assets/images/start.jpg';
        let bootImagePath = DEFAULT_BOOT_IMAGE;
        let bootImageResolved = '';
        let terrainMode = 'public';
        let activeConvoSlug = null;
        let activeConvoEntry = null;
        const CONVO_PIN_MAX_ATTEMPTS = 3;

        // ===========================================
        // DEEP LINK - Read #node= from URL hash
        // ===========================================
        function getDeepLinkNodeId() {
            const hash = window.location.hash; // e.g. "#node=1.10"
            if (!hash) return null;
            const match = hash.match(/^#node=(.+)$/);
            if (!match) return null;
            const nodeId = decodeURIComponent(match[1]);
            // Validate: node must exist, be addressable, and be shareable
            const node = manifest?.nodes?.find(n => n.id === nodeId);
            if (!node) {
                console.log('Deep link: node not found:', nodeId);
                return null;
            }
            if (node.addressable === false) {
                console.log('Deep link: node not addressable:', nodeId);
                return null;
            }
            if (node.shareable === false) {
                console.log('Deep link: node not shareable:', nodeId);
                return null;
            }
            console.log('Deep link: navigating to', nodeId);
            return nodeId;
        }

        function clearDeepLinkHash() {
            // Clean up the URL hash after using it, without triggering a page reload
            if (window.location.hash) {
                history.replaceState(null, '', window.location.pathname + window.location.search);
            }
        }

        // ===========================================
        // CONVO MODE - Slugs, PIN gate, tap-to-start
        // ===========================================
        let convoPendingStart = false;
        let convoAtLobby = false;

        function isConvoMode() {
            return terrainMode === 'convo';
        }

        function getConvoSlugFromUrl() {
            const pathMatch = window.location.pathname.match(/\/n\/([A-Za-z0-9_-]+)\/?$/);
            if (pathMatch) return pathMatch[1];
            const q = new URLSearchParams(window.location.search).get('n');
            return q || null;
        }

        function getConvoBasePath() {
            const path = window.location.pathname.replace(/\/n\/[^/]+\/?$/, '');
            if (!path || path === '/') return '';
            return path.endsWith('/') ? path.slice(0, -1) : path;
        }

        function resolveSlugEntry(slug) {
            const raw = manifest?.slugs?.[slug];
            if (!raw) return null;
            if (typeof raw === 'string') {
                return { slug, node: raw, pin: null };
            }
            return {
                slug,
                node: raw.node,
                pin: raw.pin || null,
                thread: raw.thread || null
            };
        }

        function convoUnlockKey(slug) {
            return `convo_unlock_${manifest?.terrain?.id || 'terrain'}_${slug}`;
        }

        function convoPinFailKey(slug) {
            return `convo_pin_fail_${manifest?.terrain?.id || 'terrain'}_${slug}`;
        }

        function isSlugUnlocked(slug) {
            try {
                return sessionStorage.getItem(convoUnlockKey(slug)) === '1';
            } catch (e) {
                return false;
            }
        }

        function unlockSlug(slug) {
            try {
                sessionStorage.setItem(convoUnlockKey(slug), '1');
            } catch (e) { /* ignore */ }
        }

        function getPinFailCount(slug) {
            try {
                return parseInt(localStorage.getItem(convoPinFailKey(slug)) || '0', 10) || 0;
            } catch (e) {
                return 0;
            }
        }

        function incrementPinFailCount(slug) {
            try {
                const n = getPinFailCount(slug) + 1;
                localStorage.setItem(convoPinFailKey(slug), String(n));
                return n;
            } catch (e) {
                return CONVO_PIN_MAX_ATTEMPTS;
            }
        }

        function resetPinFailCount(slug) {
            try {
                localStorage.removeItem(convoPinFailKey(slug));
            } catch (e) { /* ignore */ }

        function showConvoPinGate() {

            overlay.classList.add('active');

        function prepareConvoSession(entry) {
            if (!entry?.node) return;
            hideConvoPinGate();

            activeConvoEntry = entry;

        function beginConvoSession(entry) {
            if (!entry?.node) return;
            hideConvoPinGate();
            convoPendingStart = false;
            convoAtLobby = false;
            unlockAudio();
            primeAudioContext();

        function tryConvoPinSubmit() {
            const input = document.getElementById('convoPinInput');
            const err = document.getElementById('convoPinError');
            if (!activeConvoEntry || !input) return;

            if (getPinFailCount(activeConvoSlug) >= CONVO_PIN_MAX_ATTEMPTS) {
                if (err) err.textContent = 'Too many attempts. Try again later.';
                return;
            }

            const pin = input.value.trim();
            const expected = String(activeConvoEntry.pin || '');
            if (pin === expected) {
                resetPinFailCount(activeConvoSlug);
                unlockSlug(activeConvoSlug);
                beginConvoSession(activeConvoEntry);
                return;
            }

            const fails = incrementPinFailCount(activeConvoSlug);
            if (err) {
                err.textContent = fails >= CONVO_PIN_MAX_ATTEMPTS
                    ? 'Too many attempts. Try again later.'
                    : `Incorrect PIN (${CONVO_PIN_MAX_ATTEMPTS - fails} left)`;
            }
            input.value = '';
            input.focus();

        function getShareUrlForNode(nodeId) {
            if (!nodeId || !manifest?.slugs) return null;
            for (const [slug, raw] of Object.entries(manifest.slugs)) {
                const target = typeof raw === 'string' ? raw : raw.node;
                if (target === nodeId) {
                    const base = window.location.origin + getConvoBasePath();
                    return `${base}/n/${encodeURIComponent(slug)}`;

            return null;

            if (!activeConvoSlug) {

                return;

            activeConvoEntry = resolveSlugEntry(activeConvoSlug);
            if (!activeConvoEntry) {
                showConvoWaitingMessage('This link is not valid.');
                return;
            }

            const node = resolveNode(activeConvoEntry.node);
            if (!node) {
                showConvoWaitingMessage('This message is unavailable.');
                return;
            }

            // Shareable #node= deep links bypass PIN (pass-along content within a protected message)
            const shareableDeepLink = getDeepLinkNodeId();
            if (activeConvoEntry.pin && !isSlugUnlocked(activeConvoSlug) && !shareableDeepLink) {
                if (getPinFailCount(activeConvoSlug) >= CONVO_PIN_MAX_ATTEMPTS) {
                    showConvoWaitingMessage('Too many PIN attempts. Try again later.');

        // ===========================================
        // MEDIA URL RESOLUTION
        // ===========================================
        // Prepends mediaBase to relative paths (for R2/CDN hosted media)
        // Local dev: mediaBase is '' (empty), paths stay relative
        // Production: mediaBase is 'https://media.terrainapp.org' (or your CDN)
        function resolveMediaUrl(path) {
            if (!path) return path;
            // If already absolute URL, return as-is
            if (path.startsWith('http://') || path.startsWith('https://') || path.startsWith('data:')) {
                return path;
            }
            // Prepend mediaBase for relative paths
            return mediaBase ? `${mediaBase}/${path}` : path;
        }

        // ===========================================
        // ASSET PRELOADING
        // ===========================================
        const preloadCache = {
            images: new Map(),  // nodeId -> { src: Image element }
            audio: new Map(),   // nodeId -> { src: Audio element }
            pending: new Set()  // nodeIds currently being preloaded
        };
        
        // Persistent cache for home node images - never evicted
        // Note: Audio is NOT persistently cached because Safari has issues
        // with multiple Audio elements referencing the same URL
        const persistentCache = {
            images: new Map()   // nodeId -> { src, element }
        };
        
        const HOME_NODE_ID = '0000.0';  // Always keep this cached
        const DEFAULT_PRELOAD_MAX_NODES = 5;  // Max nodes to keep in cache

        // Performance tuning overrides (loaded from manifest.perfOverrides)
        let perfOverrides = {};

        const PERF_DEFAULTS = {
            safariAuxDelayMs: 1000,
            safariPreloadMaxNodes: 1,
            safariPreloadDelayMs: 1500,
            safariPreloadFallbackMs: 6000
        };

        function getPerfOverride(key) {
            if (perfOverrides && Object.prototype.hasOwnProperty.call(perfOverrides, key)) {
                return perfOverrides[key];
            }
            return PERF_DEFAULTS[key];
        }
        
        function preloadImage(src) {
            const resolved = resolveMediaUrl(src);
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error(`Failed to preload: ${src}`));
                img.src = resolved;
            });
        }
        
        function preloadAudio(src) {
            return new Promise((resolve) => {
                const audio = new Audio();
                audio.preload = 'auto';
                
                const onReady = () => {
                    audio.removeEventListener('canplay', onReady);
                    audio.removeEventListener('error', onError);
                    resolve(audio);
                };
                const onError = () => {
                    audio.removeEventListener('canplay', onReady);
                    audio.removeEventListener('error', onError);
                    resolve(null); // Don't reject, just return null
                };
                
                audio.addEventListener('canplay', onReady);
                audio.addEventListener('error', onError);
                audio.src = src;
                audio.load();
                
                // Timeout after 10 seconds
                setTimeout(() => {
                    audio.removeEventListener('canplay', onReady);
                    audio.removeEventListener('error', onError);
                    resolve(audio); // Return anyway, might be partially loaded
                }, 10000);
            });
        }
        
        function getAdjacentNodeIds(node) {
            const ids = new Set();
            
            // Choices
            if (node.choices) {
                node.choices.forEach(choice => {
                    if (choice.target) ids.add(choice.target);
                });
            }
            
            // AutoNext
            if (node.autoNext) {
                ids.add(node.autoNext);
            }
            
            // Interruptibles (preload immediately available ones)
            if (node.interruptible) {
                node.interruptible.forEach(int => {
                    if (int.target) ids.add(int.target);
                });
            }
            
            return Array.from(ids);
        }
        
        async function preloadNodeAssets(nodeId) {
            // Skip if already cached or being preloaded
            if (preloadCache.images.has(nodeId) || preloadCache.pending.has(nodeId)) {
                return;
            }
            
            const node = manifest?.nodes?.find(n => n.id === nodeId);
            if (!node) return;
            
            // Check for preload opt-out flag
            if (node.preload === false) {
                PerfMonitor.mark(`Skipping preload for ${nodeId} (opted out)`);
                return;
            }
            
            preloadCache.pending.add(nodeId);
            PerfMonitor.start(`preload-${nodeId}`);
            
            const promises = [];
            
            // Preload first image (carousel or visuals)
            let imageSrc = null;
            if (node.images && node.images.length > 0) {
                imageSrc = typeof node.images[0] === 'string' ? node.images[0] : node.images[0].src;
            } else if (node.visuals && node.visuals.length > 0) {
                const visual = node.visuals[0];
                if (visual.type === 'image') {
                    imageSrc = visual.src;
                } else if (visual.type === 'image_bundle' && visual.files?.length > 0) {
                    // Preload first image from bundle (can't predict selection)
                    imageSrc = visual.files[0];
                }
            }
            if (!imageSrc && node.video && node.video.poster) {
                // Video posters may be on R2 with video files - resolve URL
                imageSrc = resolveMediaUrl(node.video.poster);
            }
            
            if (imageSrc) {
                promises.push(
                    preloadImage(imageSrc).then(img => {
                        preloadCache.images.set(nodeId, { src: imageSrc, element: img });
                    }).catch(() => {})
                );
            }
            
            // Audio preloading DISABLED - causes connection competition and hangs
            // across all browsers. The browser's HTTP cache helps on repeat visits.
            // Images are the main benefit of preloading anyway.
            
            await Promise.all(promises);
            
            preloadCache.pending.delete(nodeId);
            PerfMonitor.end(`preload-${nodeId}`);
        }
        
        function preloadAdjacentNodes(currentNode) {
            const adjacentIds = getAdjacentNodeIds(currentNode);
            
            // Limit how many we preload
            const maxNodes = isSafari ? getPerfOverride('safariPreloadMaxNodes') : DEFAULT_PRELOAD_MAX_NODES;
            const toPreload = adjacentIds.slice(0, maxNodes);
            
            const preloadDelay = isSafari ? getPerfOverride('safariPreloadDelayMs') : 100;
            toPreload.forEach(nodeId => {
                // Use setTimeout to not block current execution
                setTimeout(() => preloadNodeAssets(nodeId), preloadDelay);
            });
            
            if (toPreload.length > 0) {
                PerfMonitor.mark(`Preloading ${toPreload.length} adjacent nodes: ${toPreload.join(', ')}`);
            }
        }
        
        function clearPreloadCache() {
            // Clear image references (but NOT persistent cache)
            preloadCache.images.clear();
            
            // Clear audio references (and stop any loading)
            preloadCache.audio.forEach(({ element }) => {
                if (element) {
                    element.src = '';
                }
            });
            preloadCache.audio.clear();
            
            preloadCache.pending.clear();
        }
        
        function getCachedImage(nodeId, src) {
            // Check persistent cache first (home node)
            const persistent = persistentCache.images.get(nodeId);
            if (persistent && persistent.src === src) {
                PerfMonitor.mark(`Using persistent cached image for ${nodeId}`);
                return persistent.element;
            }
            
            // Then check regular preload cache
            const cached = preloadCache.images.get(nodeId);
            if (cached && cached.src === src) {
                PerfMonitor.mark(`Using cached image for ${nodeId}`);
                return cached.element;
            }
            return null;
        }
        
        function getCachedAudio(nodeId, src) {
            // Check regular preload cache (audio is not persistently cached)
            const cached = preloadCache.audio.get(nodeId);
            if (cached && cached.src === src) {
                PerfMonitor.mark(`Using cached audio for ${nodeId}`);
                return cached.element;
            }
            return null;
        }
        
        // Preload home node IMAGE into persistent cache (never evicted)
        // Audio is NOT persistently cached - Safari has issues with multiple
        // Audio elements referencing the same URL
        async function preloadHomeNode() {
            const homeNode = manifest?.nodes?.find(n => n.id === HOME_NODE_ID);
            if (!homeNode) return;
            
            // Already cached?
            if (persistentCache.images.has(HOME_NODE_ID)) {
                return;
            }
            
            PerfMonitor.start('preload-home-persistent');
            
            // Preload home image only
            let imageSrc = null;
            if (homeNode.images && homeNode.images.length > 0) {
                imageSrc = typeof homeNode.images[0] === 'string' ? homeNode.images[0] : homeNode.images[0].src;
            } else if (homeNode.visuals && homeNode.visuals.length > 0 && homeNode.visuals[0].type === 'image') {
                imageSrc = homeNode.visuals[0].src;
            }
            
            if (imageSrc) {
                try {
                    const img = await preloadImage(imageSrc);
                    persistentCache.images.set(HOME_NODE_ID, { src: imageSrc, element: img });
                    PerfMonitor.mark(`Home image cached persistently`);
                } catch (e) {
                    // Ignore errors
                }
            }
            
            PerfMonitor.end('preload-home-persistent');
        }

        // Session navigation history (for RTN-as-Back)
        // Capped at 100 entries to prevent unbounded growth in long sessions
        const MAX_SESSION_HISTORY = 100;
        let sessionHistory = [];
        let suppressNextHistoryPush = false;

        function recordHistory(nodeId) {
            if (!nodeId) return;
            if (suppressNextHistoryPush) {
                suppressNextHistoryPush = false;
                return;
            }
            const last = sessionHistory.length ? sessionHistory[sessionHistory.length - 1] : null;
            if (last !== nodeId) {
                sessionHistory.push(nodeId);
                // Trim oldest entries if over limit
                if (sessionHistory.length > MAX_SESSION_HISTORY) {
                    sessionHistory = sessionHistory.slice(-MAX_SESSION_HISTORY);
                }
            }
        }

        function canGoBackInHistory() {
            return sessionHistory.length >= 2;
        }

        function goBackInHistory() {
            if (!canGoBackInHistory()) return false;
            // Remove current node, navigate to previous without re-pushing it
            sessionHistory.pop();
            const target = sessionHistory[sessionHistory.length - 1];
            if (!target) return false;
            suppressNextHistoryPush = true;
            loadNode(target);
            return true;
        }

        const TERRAIN_KEYPAD = {

        function terrainKeypadSpriteXY(col, row) {
            const x2 = TERRAIN_KEYPAD.padL + col * TERRAIN_KEYPAD.colStep;
            const y2 = TERRAIN_KEYPAD.padT + row * TERRAIN_KEYPAD.rowStep;

        const AUX_FADE_DURATION = 2000; // Default 2 second fade in (can be overridden per-node via aux1FadeIn)
        const AUX_MAX_VOLUME = 0.3;

        // NAV GUARD (prevents stale callbacks)
        // ===========================================
        let navVersion = 0;

        function bumpNavVersion() {
            navVersion++;
            return navVersion;
        }

        function withNavGuard(fn, versionAtSchedule) {
            const v = versionAtSchedule ?? navVersion;
            return (...args) => {
                if (v !== navVersion) return; // stale callback, ignore silently
                return fn(...args);
            };
        }

        function safeSetOnEnded(audioEl, fn, versionAtEnter) {
            audioEl.onended = withNavGuard(fn, versionAtEnter);
        }

        // ===========================================
        // TIMER REGISTRY (centralized cancel)
        // ===========================================
        const Timers = {
            timeouts: new Set(),
            intervals: new Set(),

            setTimeout(fn, ms) {
                const id = window.setTimeout(() => {
                    this.timeouts.delete(id);
                    fn();
                }, ms);
                this.timeouts.add(id);
                return id;
            },

            clearTimeout(id) {
                window.clearTimeout(id);
                this.timeouts.delete(id);
            },

            setInterval(fn, ms) {
                const id = window.setInterval(fn, ms);
                this.intervals.add(id);
                return id;
            },

            clearInterval(id) {
                window.clearInterval(id);
                this.intervals.delete(id);
            },

            clearAll() {
                this.timeouts.forEach((id) => window.clearTimeout(id));
                this.intervals.forEach((id) => window.clearInterval(id));
                this.timeouts.clear();
                this.intervals.clear();
            }
        };

        // ===========================================
        // PLAYLIST LOGIC - M3U Parsing
        // ===========================================
        async function parseM3U(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`Failed to fetch M3U: ${url}`);
                
                const text = await response.text();
                const lines = text.split('\n');
                const files = [];
                
                // Get the directory path of the M3U file for resolving relative paths
                const m3uDir = url.substring(0, url.lastIndexOf('/') + 1);
                
                for (const line of lines) {
                    const trimmed = line.trim();
                    // Skip empty lines and comments (lines starting with #)
                    if (trimmed && !trimmed.startsWith('#')) {
                        // If path is relative (doesn't start with / or http), prepend M3U directory
                        let filePath = trimmed;
                        if (!filePath.startsWith('/') && !filePath.startsWith('http')) {
                            filePath = m3uDir + filePath;
                        }
                        files.push(filePath);
                    }
                }
                
                console.log(`M3U parsed: ${files.length} tracks from ${url}`);
                return files;
                
            } catch (e) {
                console.error('M3U parse failed:', e);
                return [];
            }
        }

        let currentPlaylist = null; // { nodeId, files, currentTrack }

        function isAudioRepeat(node) {
            return node?.audio?.repeat === true;
        }

        function playPlaylistTrack(versionAtSchedule = navVersion, resumeTime = 0) {
            if (!currentPlaylist) return;
            const { files, currentTrack } = currentPlaylist;
            const trackFile = files[currentTrack];
            console.log(`Playlist: Playing track ${currentTrack + 1}/${files.length}: ${trackFile}` +
                (resumeTime > 0 ? ` (resuming at ${Math.floor(resumeTime)}s)` : ''));

            primaryAudio.src = resolveMediaUrl(trackFile);
            primaryAudio.loop = false;

            if (resumeTime > 0) {
                primaryAudio.addEventListener('loadedmetadata', () => {
                    if (resumeTime < primaryAudio.duration) {
                        primaryAudio.currentTime = resumeTime;
                    }
                }, { once: true });
            }

            safeSetOnEnded(primaryAudio, () => {
                advancePlaylist(versionAtSchedule);
            }, versionAtSchedule);

            primaryAudio.play().catch(e => console.log('Playlist track failed:', e));
        }

        function loadPlaylist(nodeId, m3uPath, versionAtEnter = navVersion) {
            parseM3U(m3uPath).then(files => {
                if (versionAtEnter !== navVersion) return; // stale
                if (files.length === 0) {
                    console.error('Playlist empty or failed to load');
                    return;
                }
                
                const playlistState = getPlaylistState(nodeId);
                let trackIndex = playlistState.currentTrack || 0;
                if (trackIndex >= files.length) trackIndex = 0;
                const savedTime = trackIndex === (playlistState.currentTrack || 0)
                    ? (playlistState.currentTime || 0)
                    : 0;
                
                currentPlaylist = {
                    nodeId: nodeId,
                    files: files,
                    currentTrack: trackIndex
                };
                
                playPlaylistTrack(versionAtEnter, savedTime);
                startProgressUpdates();
            });
        }

        function advancePlaylist(versionAtSchedule = navVersion) {
            if (versionAtSchedule !== navVersion) return;
            if (!currentPlaylist) return;
            
            const nextTrack = currentPlaylist.currentTrack + 1;
            
            if (nextTrack >= currentPlaylist.files.length) {
                console.log('Playlist complete');
                const nodeId = currentPlaylist.nodeId;

                if (isAudioRepeat(currentNode)) {
                    console.log('Playlist: repeating from start');
                    currentPlaylist.currentTrack = 0;
                    savePlaylistState(nodeId, { currentTrack: 0, currentTime: 0 });
                    playPlaylistTrack(versionAtSchedule, 0);
                    return;
                }

                currentPlaylist = null;
                savePlaylistState(nodeId, { currentTrack: 0, currentTime: 0 });

                if (currentNode && currentNode.autoNext) {
                    const sourceNode = currentNode;
                    playTransitionThen(
                        withNavGuard(() => {
                            loadNode(currentNode.autoNext);
                        }, versionAtSchedule),
                        sourceNode
                    );
                }
                return;
            }
            
            currentPlaylist.currentTrack = nextTrack;
            savePlaylistState(currentPlaylist.nodeId, { currentTrack: nextTrack, currentTime: 0 });
            playPlaylistTrack(versionAtSchedule, 0);
        }

        function getStorageKey() {
            // Use manifest ID to scope storage per-installation
            return manifest ? `terrain_state_${manifest.terrain.id}` : null;

        function loadTerrainState() {
            const key = getStorageKey();
            if (!key) return null;
            
            try {
                const data = localStorage.getItem(key);
                const state = data ? JSON.parse(data) : { bundles: {}, playlists: {}, imageBundles: {} };
                // Ensure imageBundles exists (for backward compatibility)
                if (!state.imageBundles) state.imageBundles = {};
                return state;
            } catch (e) {
                console.error('Failed to load state:', e);
                return { bundles: {}, playlists: {}, imageBundles: {} };
            }
        }

        function saveTerrainState(state) {
            const key = getStorageKey();
            if (!key) return;
            
            try {
                localStorage.setItem(key, JSON.stringify(state));
            } catch (e) {
                console.error('Failed to save state:', e);
            }
        }

        function getBundleState(nodeId) {
            const state = loadTerrainState();
            return state.bundles[nodeId] || { playedIndices: [], currentIndex: 0 };
        }

        function saveBundleState(nodeId, bundleState) {
            const state = loadTerrainState();
            state.bundles[nodeId] = bundleState;

        }

        // Image bundle state (separate from audio bundles)

        // ===========================================
        // NAVIGATOR - Session & Index Management
        // ===========================================
        let navigatorState = {
            sessionJourney: [],
            persistentIndex: {}
        };

        function loadNavigatorState() {
            const key = getStorageKey();
            if (!key) return;
            
            try {
                const data = localStorage.getItem(`${key}_navigator`);
                if (data) {
                    const loaded = JSON.parse(data);
                    navigatorState.persistentIndex = loaded.persistentIndex || {};
                    // Session journey always starts fresh
                    navigatorState.sessionJourney = [];
                }
            } catch (e) {
                console.error('Failed to load navigator state:', e);
            }
        }

        function saveNavigatorState() {
            const key = getStorageKey();
            if (!key) return;
            
            try {
                // Only save persistent index, not session journey
                const toSave = {
                    persistentIndex: navigatorState.persistentIndex
                };
                localStorage.setItem(`${key}_navigator`, JSON.stringify(toSave));
                console.log('Navigator state saved');
            } catch (e) {
                console.error('Failed to save navigator state:', e);
            }
        }

        // Cap session journey to prevent unbounded growth (this is visible in UI)
        const MAX_SESSION_JOURNEY = 200;
        
        function addToNavigator(node) {
            if (!node) return;
            
            const timestamp = Date.now();
            
            // Always add to session journey
            navigatorState.sessionJourney.push({
                nodeId: node.id,
                title: node.title,
                type: node.type,
                timestamp: timestamp
            });
            
            // Trim oldest entries if over limit
            if (navigatorState.sessionJourney.length > MAX_SESSION_JOURNEY) {
                navigatorState.sessionJourney = navigatorState.sessionJourney.slice(-MAX_SESSION_JOURNEY);
            }
            
            // Add to persistent index if connection or destination (and indexable)
            if ((node.type === 'connection' || node.type === 'destination') && node.indexable !== false) {
                if (!navigatorState.persistentIndex[node.id]) {
                    // First time visiting this node
                    navigatorState.persistentIndex[node.id] = {
                        title: node.title,
                        type: node.type,
                        userNote: '',
                        firstVisited: timestamp,
                        visitCount: 1,
                        tags: node.tags || []
                    };
                } else {
                    // Increment visit count
                    navigatorState.persistentIndex[node.id].visitCount++;
                }
                
                // Auto-save after adding
                saveNavigatorState();
            }
        }

        function deleteFromIndex(nodeId) {
            if (navigatorState.persistentIndex[nodeId]) {
                delete navigatorState.persistentIndex[nodeId];
                saveNavigatorState();
            }
        }

        function updateNodeNote(nodeId, note) {
            if (navigatorState.persistentIndex[nodeId]) {
                navigatorState.persistentIndex[nodeId].userNote = note;
                saveNavigatorState();
            }
        }

        function exportNavigatorIndex() {
            const dataStr = JSON.stringify(navigatorState.persistentIndex, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            
            const link = document.createElement('a');
            link.href = url;
            link.download = `terrain-index-${manifest.terrain.id}-${Date.now()}.json`;
            link.click();
            
            URL.revokeObjectURL(url);
        }

        function handleIndexFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const importedIndex = JSON.parse(e.target.result);
                    
                    // Validate structure (should be object with nodeId keys)
                    if (typeof importedIndex !== 'object' || Array.isArray(importedIndex)) {
                        throw new Error('Invalid index format');
                    }
                    
                    // Merge imported index with existing (imported data takes precedence)
                    const mergedCount = Object.keys(importedIndex).length;
                    let newCount = 0;
                    
                    for (const nodeId in importedIndex) {
                        if (!navigatorState.persistentIndex[nodeId]) {
                            newCount++;
                        }
                        navigatorState.persistentIndex[nodeId] = {
                            ...navigatorState.persistentIndex[nodeId],
                            ...importedIndex[nodeId]
                        };
                    }
                    
                    saveNavigatorState();
                    renderPersistentIndex();
                    
                    // Update count display
                    document.getElementById('indexCount').textContent = 
                        `${Object.keys(navigatorState.persistentIndex).length} nodes`;
                    
                    console.log(`Imported ${mergedCount} nodes (${newCount} new)`);
                    alert(`Imported ${mergedCount} nodes (${newCount} new to your index)`);
                    
                } catch (err) {
                    console.error('Failed to import index:', err);
                    alert('Failed to import index: ' + err.message);
                }
            };
            
            reader.onerror = () => {
                alert('Failed to read file');
            };
            
            reader.readAsText(file);
            
            // Reset input so the same file can be imported again if needed
            event.target.value = '';
        }

        // ===========================================
        // BUNDLE LOGIC - File Selection
        // ===========================================
        function selectBundleFile(files, mode, nodeId) {
            if (!files || files.length === 0) return null;
            if (files.length === 1) return files[0];
            
            const bundleState = getBundleState(nodeId);
            let selectedIndex;
            
            if (mode === 'sequential') {
                // Sequential: just increment and loop
                selectedIndex = bundleState.currentIndex % files.length;
                bundleState.currentIndex = (bundleState.currentIndex + 1) % files.length;
                
            } else if (mode === 'random') {
                // Pure random
                selectedIndex = Math.floor(Math.random() * files.length);
                
            } else if (mode === 'random_tracked') {
                // Random but don't repeat until all played
                let availableIndices = [];
                for (let i = 0; i < files.length; i++) {
                    if (!bundleState.playedIndices.includes(i)) {
                        availableIndices.push(i);
                    }
                }
                
                // If all played, reset
                if (availableIndices.length === 0) {
                    bundleState.playedIndices = [];
                    availableIndices = Array.from({ length: files.length }, (_, i) => i);
                }
                
                // Pick random from available
                selectedIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)];
                bundleState.playedIndices.push(selectedIndex);
                
            } else {
                // Default to first file
                selectedIndex = 0;
            }
            
            saveBundleState(nodeId, bundleState);
            
            console.log(`Bundle [${mode}]: Selected ${files[selectedIndex]} (${selectedIndex + 1}/${files.length})`);
            return files[selectedIndex];
        }
